<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale X</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <nav class="navbar">
            <div class="logo">
                <img id="logo-img" src="./Assests/logo.png" alt="Logo Image">
                <a class="logo-text" href="">ScaleX</a>
            </div>
            <div class="navigations">
                <a class="nav-links" href="">Home</a>
                <a class="nav-links" href="">About Us</a>
                <a class="nav-links" href="">Blog</a>
                <a class="nav-links" href="">Contact Us</a>
            </div>
            <div class="logo-button-container"><button class="logo-button">Get Started</button></div>
        </nav>
        <section class="hero">
            <h1 class="main-heading">Insights & Blogs</h1>
        </section>
        <div class="tech-button-container">
            <button class="tech-buttons">All</button>
            <button class="tech-buttons">Tech</button>
            <button class="tech-buttons">SaaS</button>
            <button class="tech-buttons">Marketing</button>
        </div>
        <div class="cards-container">
            <div class="individul-card">
                <div class="img-container"><img class="img" src="./Assests/glass.png" alt=""></div>
                <div class="about-card">
                    <div class="button"><button class="card-button">Tech</button></div>
                    <div class="about"><p>The Ultimate Guide To SaaS Marketing</p></div>
                    <div class="date"><p>May 23,2025</p></div>
                </div>
            </div>
            <div class="individul-card">
                <div class="img-container"><img class="img" src="./Assests/chair.png" alt=""></div>
                <div class="about-card">
                    <div class="button"><button class="card-button">Tech</button></div>
                    <div class="about"><p>5 Key Trends In SaaS Growth For 2025</p></div>
                    <div class="date"><p>May 23,2025</p></div>
                </div>
            </div>
            <div class="individul-card">
                <div class="img-container"><img class="img" src="./Assests/cat.png" alt=""></div>
                <div class="about-card">
                    <div class="button"><button class="card-button">Tech</button></div>
                    <div class="about"><p>How Data-Driven Strategies Are Important</p></div>
                    <div class="date"><p>May 23,2025</p></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
